<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>乖乖我爱你</title>
<style>
:root { --bg: #000000; }

* { margin:0;padding:0;box-sizing:border-box; }

body {
  width:100vw;height:100dvh;overflow:hidden;
  background:var(--bg);
  font-family:"PingFang SC","Microsoft YaHei",-apple-system,sans-serif;
  -webkit-tap-highlight-color:transparent;
  user-select:none;-webkit-user-select:none;
}

#heartCanvas {
  position:fixed;inset:0;z-index:0;
}

/* 标题 */
.header {
  position:fixed;top:0;left:0;right:0;z-index:10;
  padding:clamp(14px,3vh,28px) 24px;display:flex;justify-content:center;
  pointer-events:none;
}
.title {
  font-size:clamp(1.5rem,5vw,3rem);font-weight:800;letter-spacing:0.1em;
  background:linear-gradient(135deg,#ff6b9d,#ff2d6a,#ff6b9d,#ffb3c6);
  background-size:300% 100%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:titleShine 4s ease-in-out infinite;line-height:1.3;
}
@keyframes titleShine { 0%,100%{background-position:0% 50%} 50%{background-position:100% 50%} }

/* 底部 */
.footer {
  position:fixed;bottom:clamp(10px,3vh,34px);left:0;right:0;z-index:10;
  display:flex;flex-direction:column;align-items:center;gap:10px;padding:0 16px;
}
.btn-row { display:flex;gap:10px;flex-wrap:wrap;justify-content:center; }
.btn {
  padding:10px 22px;border:1px solid rgba(255,255,255,0.12);border-radius:40px;
  background:rgba(255,255,255,0.05);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  color:rgba(255,255,255,0.9);font-size:clamp(0.78rem,2vw,0.9rem);font-weight:600;
  font-family:inherit;letter-spacing:0.04em;cursor:pointer;transition:all 0.25s;white-space:nowrap;
}
.btn:active{transform:scale(0.94)}
.btn--pink{background:rgba(255,45,105,0.22);border-color:rgba(255,45,105,0.38)}
.btn--pink:hover{background:rgba(255,45,105,0.35);box-shadow:0 0 30px rgba(255,45,105,0.22)}

.btn--purple{background:rgba(140,80,255,0.18);border-color:rgba(140,80,255,0.33)}

@media (min-width:768px) {
  .btn:hover{transform:translateY(-2px);background:rgba(255,255,255,0.09);border-color:rgba(255,255,255,0.22)}
  .btn--pink:hover{transform:translateY(-2px)}.btn--gold:hover{transform:translateY(-2px)}.btn--purple:hover{transform:translateY(-2px)}
}

.toast {
  padding:10px 26px;border-radius:40px;background:rgba(255,255,255,0.05);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,0.06);
  color:rgba(255,255,255,0.9);font-size:clamp(0.75rem,2vw,0.85rem);text-align:center;
  letter-spacing:0.04em;transition:opacity 0.45s,transform 0.45s;pointer-events:none;max-width:90vw;line-height:1.5;
}
.toast--hidden{opacity:0;transform:translateY(8px)}

#fwCanvas {

}

@media (max-width:480px) { .btn{padding:9px 16px;font-size:0.78rem}.btn-row{gap:6px} }

<body>

<canvas id="heartCanvas"></canvas>
<canvas id="fwCanvas"></canvas>

<div class="header">
  <div class="title">乖乖我爱你</div>
</div>

<div class="footer">
  <div class="btn-row">
    <button class="btn btn--pink" id="btnFirework">🎆 烟花</button>
    <button class="btn btn--gold" id="btnBubble">💖 爱心雨</button>
    <button class="btn btn--purple" id="btnStar">✨ 星尘</button>
    <button class="btn" id="btnMessage">💌 情话</button>
    <button class="btn" id="btnMusic">A Thousand Years</button>
  </div>
  <div class="toast" id="toast">点击爱心有惊喜 · 按F放烟花</div>
</div>

<script>
// ═══════════════════════════════════════════
//  爱心粒子动画 - 高性能版
// ═══════════════════════════════════════════

const heartCanvas = document.getElementById('heartCanvas');
const hCtx = heartCanvas.getContext('2d');

let CW, CH, CX, CY, IMAGE_ENLARGE;
function resizeHeartCanvas() {
  heartCanvas.width = CW = window.innerWidth;
  heartCanvas.height = CH = window.innerHeight;
  CX = CW / 2; CY = CH / 2;
  IMAGE_ENLARGE = Math.min(CW, CH) * 0.013;
}
resizeHeartCanvas();

const TAU = Math.PI * 2;

function heartXY(t, sr) {
  const x = 17 * Math.pow(Math.sin(t), 3);
  const y = -(16*Math.cos(t) - 5*Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t));
  return [x * sr + CX, y * sr + CY];
}

function scatterXY(x, y, beta) {
  const rx = -beta * Math.log(Math.random());
  const ry = -beta * Math.log(Math.random());
  return [x - rx*(x-CX), y - ry*(y-CY)];
}

function curve(p) { return (4*Math.sin(4*p))/TAU; }

// 预计算粒子数据 — 扁平数组 [x0,y0,s0, x1,y1,s1, ...]
let frames = [];
let frameCount = 20;

function buildHeartData() {
  frames = [];
  const N_HEART = 600;
  const N_CENTER = 3000;
  const N_HALO_BASE = 800;

  // (1) 心形轮廓点
  const hpts = [];
  for (let i = 0; i < N_HEART; i++) hpts.push(heartXY(Math.random()*TAU, IMAGE_ENLARGE));

  // (2) 边缘扩散点
  const edgePts = [];
  for (const [px,py] of hpts) for (let k=0;k<3;k++) edgePts.push(scatterXY(px,py,0.05));

  // (3) 内部扩散点
  const centerPts = [];
  for (let i=0;i<N_CENTER;i++) centerPts.push(scatterXY(hpts[Math.floor(Math.random()*N_HEART)][0], hpts[Math.floor(Math.random()*N_HEART)][1], 0.27));

  function forceCalc(px, py, ratio, jitter) {
    const d = 1 / Math.pow((px-CX)*(px-CX)+(py-CY)*(py-CY), 0.42);
    const dx = ratio*d*(px-CX) + Math.floor(Math.random()*jitter) - (jitter>>1);
    const dy = ratio*d*(py-CY) + Math.floor(Math.random()*jitter) - (jitter>>1);
    return [px-dx, py-dy];
  }

  for (let f=0; f<frameCount; f++) {
    const ratio = 15 * curve(f/10*Math.PI);
    const haloR = Math.floor(4+6*(1+curve(f/10*Math.PI)));
    const haloN = Math.floor(N_HALO_BASE + 1000*Math.abs(curve(f/10*Math.PI)**2));
    const arr = [];

    // 光晕
    const haloSet = {};
    for (let i=0;i<haloN;i++) {
      const t = Math.random()*TAU;
      let [hx,hy] = heartXY(t, -15);
      const ds = (hx-CX)*(hx-CX)+(hy-CY)*(hy-CY);
      const fr = -1/Math.pow(ds,0.6);
      hx -= fr*haloR*(hx-CX); hy -= fr*haloR*(hy-CY);
      const k = Math.round(hx)+','+Math.round(hy);
      if (!haloSet[k]) { haloSet[k]=1;
        hx += Math.floor(Math.random()*121)-60;
        hy += Math.floor(Math.random()*121)-60;
        const s = Math.random()<0.5?1:2;
        arr.push(hx,hy,s);
      }
    }
    // 轮廓
    for (const [px,py] of hpts) { const [x,y]=forceCalc(px,py,ratio,3); arr.push(x,y,Math.floor(Math.random()*3)+1); }
    // 边缘
    for (const [px,py] of edgePts) { const [x,y]=forceCalc(px,py,ratio,3); arr.push(x,y,Math.floor(Math.random()*2)+1); }
    // 内部
    for (const [px,py] of centerPts) { const [x,y]=forceCalc(px,py,ratio,3); arr.push(x,y,Math.floor(Math.random()*2)+1); }

    frames.push(arr);
  }
}

// 直接构建粒子数据
buildHeartData();

// 用 ImageData 渲染 — 零状态切换
const HEART_COLOR = [0x7f, 0xff, 0xd4]; // aquamarine
const FRAME_INTERVAL = 80; // ~12.5 fps, 匹配原始动画速度
let imgData, lastFrameTime = 0;

function renderHeartFrame(fi) {
  if (!frames.length) return requestAnimationFrame(()=>renderHeartFrame(fi));

  const now = performance.now();
  const elapsed = now - lastFrameTime;
  if (elapsed < FRAME_INTERVAL) {
    requestAnimationFrame(()=>renderHeartFrame(fi));
    return;
  }
  lastFrameTime = now - (elapsed % FRAME_INTERVAL);

  hCtx.clearRect(0,0,CW,CH);

  // 背景光晕
  hCtx.save();
  hCtx.globalAlpha=0.06;
  const GR = Math.min(CW,CH)*0.28;
  const gg=hCtx.createRadialGradient(CX,CY,GR*0.3,CX,CY,GR);
  gg.addColorStop(0,'#ff4470'); gg.addColorStop(0.5,'rgba(255,60,100,0.15)'); gg.addColorStop(1,'transparent');
  hCtx.fillStyle=gg; hCtx.fillRect(0,0,CW,CH);
  hCtx.restore();

  // 粒子 — ImageData 批量写入
  const pts = frames[fi % frameCount];
  if (!pts) { requestAnimationFrame(()=>renderHeartFrame(fi)); return; }

  imgData = imgData || hCtx.createImageData(CW, CH);
  const buf = imgData.data;
  // 清除上一帧
  for (let i=3;i<buf.length;i+=4) { buf[i]=0; buf[i-1]=0; buf[i-2]=0; }

  const [r,g,b] = HEART_COLOR;
  const len = pts.length;
  for (let i=0;i<len;i+=3) {
    const x=pts[i]|0, y=pts[i+1]|0, s=pts[i+2]|0;
    for (let dy=0;dy<s;dy++) {
      const row = y+dy; if (row<0||row>=CH) continue;
      const off = row*CW*4;
      for (let dx=0;dx<s;dx++) {
        const col=x+dx; if (col<0||col>=CW) continue;
        const idx=off+col*4;
        buf[idx]=r; buf[idx+1]=g; buf[idx+2]=b; buf[idx+3]=255;
      }
    }
  }
  hCtx.putImageData(imgData,0,0);

  requestAnimationFrame(()=>renderHeartFrame(fi+1));
}

// ═══════════════════════════════════════════
//  烟花系统
// ═══════════════════════════════════════════

const fwCanvas = document.getElementById('fwCanvas');
const fwCtx = fwCanvas.getContext('2d');
let fireworks = [];

function resizeFw() {
  fwCanvas.width = window.innerWidth;
  fwCanvas.height = window.innerHeight;
}
resizeFw();

class Rocket {
  constructor(x, targetY) {
    this.x=x;this.y=window.innerHeight;this.targetY=targetY;
    this.speed=7+Math.random()*5;this.trail=[];
    this.color=['#ff3060','#ffd740','#ff8c00','#c084fc','#22d3ee','#f472b6'][Math.floor(Math.random()*6)];
  }
  update(){
    this.trail.push({x:this.x,y:this.y,life:1});
    if(this.trail.length>18) this.trail.shift();
    this.y-=this.speed;this.trail.forEach(t=>t.life-=0.055);
    return this.y<=this.targetY;
  }
  draw(ctx){
    this.trail.forEach(t=>{
      ctx.save();ctx.globalAlpha=t.life*0.5;ctx.fillStyle=this.color;ctx.shadowBlur=6;ctx.shadowColor=this.color;
      ctx.beginPath();ctx.arc(t.x,t.y,2,0,Math.PI*2);ctx.fill();ctx.restore();
    });
    ctx.save();ctx.fillStyle='#fff';ctx.shadowBlur=14;ctx.shadowColor=this.color;
    ctx.beginPath();ctx.arc(this.x,this.y,3.5,0,Math.PI*2);ctx.fill();ctx.restore();
  }
}

class Spark {
  constructor(x,y,color){
    this.x=x;this.y=y;const a=Math.random()*Math.PI*2;const s=Math.random()*7+2;
    this.vx=Math.cos(a)*s;this.vy=Math.sin(a)*s;
    this.color=color;this.life=1;this.decay=Math.random()*0.016+0.005;
    this.size=Math.random()*2.2+0.6;this.g=0.025;this.fr=0.987;
  }
  update(){this.x+=this.vx;this.y+=this.vy;this.vy+=this.g;this.vx*=this.fr;this.vy*=this.fr;this.life-=this.decay;}
  draw(ctx){
    ctx.save();ctx.globalAlpha=Math.max(0,this.life);ctx.fillStyle=this.color;ctx.shadowBlur=5;ctx.shadowColor=this.color;
    ctx.beginPath();ctx.arc(this.x,this.y,this.size*this.life,0,Math.PI*2);ctx.fill();ctx.restore();
  }
}

class Burst {
  constructor(x,y){
    this.sparks=[];const c=['#ff3060','#ff6b9d','#ffd740','#ff8c00','#c084fc','#22d3ee','#f472b6','#fbbf24'];
    const p=[c[Math.floor(Math.random()*c.length)],c[Math.floor(Math.random()*c.length)],c[Math.floor(Math.random()*c.length)]];
    for(let i=0;i<130;i++) this.sparks.push(new Spark(x,y,p[Math.floor(Math.random()*3)]));
  }
  update(){this.sparks.forEach(s=>s.update());this.sparks=this.sparks.filter(s=>s.life>0);}
  draw(ctx){this.sparks.forEach(s=>s.draw(ctx));}
  get done(){return this.sparks.length===0;}
}

function launchFireworks(n){
  for(let i=0;i<n;i++) setTimeout(()=>{
    const x=window.innerWidth*0.1+Math.random()*window.innerWidth*0.8;
    const ty=window.innerHeight*0.06+Math.random()*window.innerHeight*0.4;
    fireworks.push({type:'r',obj:new Rocket(x,ty)});
  },i*140);
}

function animFw(){
  fwCtx.clearRect(0,0,fwCanvas.width,fwCanvas.height);
  const nf=[];
  for(const f of fireworks){
    if(f.type==='r'){
      if(f.obj.update()) nf.push({type:'b',obj:new Burst(f.obj.x,f.obj.y)});
      else {f.obj.draw(fwCtx);nf.push(f);}
    } else {f.obj.update();f.obj.draw(fwCtx);if(!f.obj.done) nf.push(f);}
  }
  fireworks=nf;requestAnimationFrame(animFw);
}
animFw();

// ═══════════════════════════════════════════
//  爱心泡泡雨
// ═══════════════════════════════════════════

function spawnBubbles(x,y,n){
  const t=['❤️','💖','💕','💗','💝','💘','✨','💌','🩷','💓','🌟'];
  for(let i=0;i<n;i++){
    const el=document.createElement('div');
    el.style.cssText=`position:fixed;pointer-events:none;z-index:20;left:${x+(Math.random()-0.5)*40}px;top:${y+(Math.random()-0.5)*40}px;font-size:${Math.random()*2+1.2}rem;animation:bubbleFloat ${Math.random()*1+1.2}s ease-out forwards;animation-delay:${Math.random()*0.3}s;`;
    el.textContent=t[Math.floor(Math.random()*t.length)];
    document.body.appendChild(el);
    el.addEventListener('animationend',()=>el.remove());
  }
}

const bs=document.createElement('style');
bs.textContent=`@keyframes bubbleFloat{0%{transform:translate(0,0) scale(0.15);opacity:1}40%{transform:translate(${Math.random()*160-80}px,-70px) scale(1.35);opacity:0.85}100%{transform:translate(${Math.random()*200-100}px,-180px) scale(0.35);opacity:0}}`;
document.head.appendChild(bs);

// ═══════════════════════════════════════════
//  Toast
// ═══════════════════════════════════════════

const toastEl=document.getElementById('toast');
let toastTimer;
function showToast(m){
  clearTimeout(toastTimer);
  toastEl.classList.remove('toast--hidden');toastEl.textContent=m;
  toastTimer=setTimeout(()=>toastEl.classList.add('toast--hidden'),3000);
}

function showRandomMessage(){
  const m=['在这个世界上，最幸运的事就是遇见你 💕','乖乖，你的笑容是我每天的阳光 ☀️','无论多远，我的心都和你在一起 🌍','你是我生命中最美好的意外 💝','每一天都想对你说：我爱你 ❤️','你是我的心跳，是我的唯一 💗','想和你一起慢慢变老 👵👴','乖乖是这个世界上最可爱的人 🥰','遇见你，是我这辈子最大的幸运 🍀','春风十里不如你 🌸','你就是我的全世界 🌎','和你在一起的每一秒都很甜 🍯','愿做你的守护星，永远闪亮 ⭐','陪你看遍世间所有美好 🏔️','爱你就像爱生命 📖'];
  showToast(m[Math.floor(Math.random()*m.length)]);
  spawnBubbles(window.innerWidth/2,window.innerHeight*0.45,12);
}

// ═══════════════════════════════════════════
//  音乐 - A Thousand Years
// ═══════════════════════════════════════════

let audioCtx=null,musicPlaying=false,musicTimer=null;

function toggleMusic(){
  if(!audioCtx){try{audioCtx=new(window.AudioContext||window.webkitAudioContext)()}catch(e){return}}
  if(musicPlaying){clearTimeout(musicTimer);musicPlaying=false;document.getElementById('btnMusic').textContent='🎵 A Thousand Years';showToast('音乐已暂停');return}
  musicPlaying=true;document.getElementById('btnMusic').textContent='🎵 暂停';showToast('A Thousand Years ♪');

  const melody=[
    // Verse "Heart beats fast"
    294,349,392,440,466,440,392,349,
    294,349,392,440,466,440,392,349,
    262,311,349,392,440,392,349,311,
    262,311,349,392,440,392,349,311,
    // Chorus
    233,294,349,233,294,349,
    233,262,311,233,262,311,
    233,294,349,392,349,311,294,262,233,
    294,349,392,349,294,262,233
  ];
  const bass=[117,87,98,78,117,87,98,78,117,87,98,78,117,87,98,78];
  const chordRoots=[117,87,98,78,117,87,98,78,117,87,98,78,117,87,98,78];
  const chordIntervals=[4,4,3,4,4,4,3,4,4,4,3,4,4,4,3,4];
  const noteLen=0.42;let idx=0;

  function playChord(root,interval){
    [root,root*Math.pow(2,interval/12),root*Math.pow(2,7/12)].forEach((f,j)=>{
      const o=audioCtx.createOscillator(),g=audioCtx.createGain();
      o.type=j===0?'triangle':'sine';o.frequency.value=f;
      g.gain.setValueAtTime(j===0?0.07:0.04,audioCtx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+noteLen*0.8);
      o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+noteLen*0.8);
    });
  }

  function pn(){
    if(!musicPlaying||!audioCtx)return;
    const mi=idx%melody.length;
    const o1=audioCtx.createOscillator(),g1=audioCtx.createGain();
    o1.type='sine';o1.frequency.value=melody[mi];
    g1.gain.setValueAtTime(0.11,audioCtx.currentTime);
    g1.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+noteLen*0.85);
    o1.connect(g1);g1.connect(audioCtx.destination);o1.start();o1.stop(audioCtx.currentTime+noteLen*0.85);
    const o2=audioCtx.createOscillator(),g2=audioCtx.createGain();
    o2.type='sine';o2.frequency.value=melody[mi]*2;
    g2.gain.setValueAtTime(0.025,audioCtx.currentTime);
    g2.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+noteLen*0.65);
    o2.connect(g2);g2.connect(audioCtx.destination);o2.start();o2.stop(audioCtx.currentTime+noteLen*0.65);
    if(mi%4===0) playChord(chordRoots[Math.floor(mi/4)%chordRoots.length], chordIntervals[Math.floor(mi/4)%16]);
    if(mi%2===0){
      const ob=audioCtx.createOscillator(),gb=audioCtx.createGain();
      ob.type='triangle';ob.frequency.value=bass[Math.floor(mi/2)%bass.length];
      gb.gain.setValueAtTime(0.06,audioCtx.currentTime);
      gb.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+noteLen*1.5);
      ob.connect(gb);gb.connect(audioCtx.destination);ob.start();ob.stop(audioCtx.currentTime+noteLen*1.5);
    }
    idx++;
    musicTimer=setTimeout(pn,noteLen*1000);
  }
  pn();
}

// ═══════════════════════════════════════════
//  交互: 点击爱心
// ═══════════════════════════════════════════

heartCanvas.addEventListener('click', (e) => {
  spawnBubbles(e.clientX, e.clientY, 15);
  launchFireworks(3);
  const msgs = ['乖乖最好啦~ 🥰','好爱好爱你 💕','为你心动 💗','爱的抱抱 🤗','亲一个 😘'];
  showToast(msgs[Math.floor(Math.random()*msgs.length)]);
});

heartCanvas.addEventListener('dblclick', (e) => {
  e.preventDefault();
  launchFireworks(10);
  spawnBubbles(e.clientX, e.clientY, 25);
  showToast('满满的爱都给你 💖');
});

// ═══════════════════════════════════════════
//  按钮绑定
// ═══════════════════════════════════════════

document.getElementById('btnFirework').addEventListener('click',()=>{launchFireworks(12);showToast('为你绽放最美的烟花 🎆')});
document.getElementById('btnBubble').addEventListener('click',()=>{
  const cx=window.innerWidth/2,cy=window.innerHeight*0.42;
  for(let i=0;i<8;i++) setTimeout(()=>spawnBubbles(cx+(Math.random()-0.5)*220,cy+(Math.random()-0.5)*160,10),i*100);
  showToast('爱你一万遍 💖');
});
document.getElementById('btnStar').addEventListener('click',()=>{
  launchFireworks(6);
  for(let i=0;i<40;i++) setTimeout(()=>spawnBubbles(Math.random()*window.innerWidth*0.8+window.innerWidth*0.1,Math.random()*window.innerHeight*0.35+window.innerHeight*0.05,4),i*35);
  showToast('满天繁星，不如你眼睛里的光 ✨');
});
document.getElementById('btnMessage').addEventListener('click',showRandomMessage);
document.getElementById('btnMusic').addEventListener('click',toggleMusic);

// 键盘
window.addEventListener('keydown',e=>{
  switch(e.key.toLowerCase()){
    case'f':launchFireworks(10);showToast('🎆 为你绽放！');break;
    case'b':spawnBubbles(window.innerWidth/2,window.innerHeight/2,25);showToast('💖 爱心雨！');break;
    case'm':showRandomMessage();break;
  }
});

// 窗口大小变化
window.addEventListener('resize', () => {
  resizeHeartCanvas();
  resizeFw();
  // 重建爱心数据因为尺寸变了
  buildHeartData();
});

// 启动爱心动画
renderHeartFrame(0);

// 欢迎
setTimeout(()=>launchFireworks(4), 800);
</script>
</body>
</html>

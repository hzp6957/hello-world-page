<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>乖乖我爱你</title>
<style>
:root { --bg: #000000; }

* { margin:0;padding:0;box-sizing:border-box; }

body {
  width:100vw;height:100dvh;overflow:hidden;
  background:var(--bg);
  font-family:"PingFang SC","Microsoft YaHei",-apple-system,sans-serif;
  -webkit-tap-highlight-color:transparent;
  user-select:none;-webkit-user-select:none;
}

#heartCanvas { position:fixed;inset:0;z-index:0; }
#sparkleCanvas { position:fixed;inset:0;z-index:2;pointer-events:none; }

.header {
  position:fixed;top:0;left:0;right:0;z-index:10;
  padding:clamp(14px,3vh,28px) 24px;display:flex;justify-content:center;
  pointer-events:none;
}
.title {
  font-size:clamp(1.5rem,5vw,3rem);font-weight:800;letter-spacing:0.1em;
  background:linear-gradient(135deg,#ff6b9d,#ff2d6a,#ff6b9d,#ffb3c6);
  background-size:300% 100%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:titleShine 4s ease-in-out infinite;line-height:1.3;
}
@keyframes titleShine { 0%,100%{background-position:0% 50%} 50%{background-position:100% 50%} }

.footer {
  position:fixed;bottom:clamp(10px,3vh,34px);left:0;right:0;z-index:10;
  display:flex;flex-direction:column;align-items:center;gap:10px;padding:0 16px;
}
.btn-row { display:flex;gap:10px;flex-wrap:wrap;justify-content:center; }
.btn {
  padding:10px 22px;border:1px solid rgba(255,255,255,0.12);border-radius:40px;
  background:rgba(255,255,255,0.05);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  color:rgba(255,255,255,0.9);font-size:clamp(0.78rem,2vw,0.9rem);font-weight:600;
  font-family:inherit;letter-spacing:0.04em;cursor:pointer;transition:all 0.25s;white-space:nowrap;
}
.btn:active{transform:scale(0.94)}
.btn--pink{background:rgba(255,45,105,0.22);border-color:rgba(255,45,105,0.38)}
.btn--pink:hover{background:rgba(255,45,105,0.35);box-shadow:0 0 30px rgba(255,45,105,0.22)}
.btn--gold{background:rgba(255,180,40,0.18);border-color:rgba(255,180,40,0.33)}
.btn--gold:hover{background:rgba(255,180,40,0.3);box-shadow:0 0 30px rgba(255,180,40,0.2)}
.btn--purple{background:rgba(140,80,255,0.18);border-color:rgba(140,80,255,0.33)}
.btn--purple:hover{background:rgba(140,80,255,0.3);box-shadow:0 0 30px rgba(140,80,255,0.2)}
@media (min-width:768px) {
  .btn:hover{transform:translateY(-2px);background:rgba(255,255,255,0.09);border-color:rgba(255,255,255,0.22)}
  .btn--pink:hover{transform:translateY(-2px)}.btn--gold:hover{transform:translateY(-2px)}.btn--purple:hover{transform:translateY(-2px)}
}

.toast {
  padding:10px 26px;border-radius:40px;background:rgba(255,255,255,0.05);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,0.06);
  color:rgba(255,255,255,0.9);font-size:clamp(0.75rem,2vw,0.85rem);text-align:center;
  letter-spacing:0.04em;transition:opacity 0.45s,transform 0.45s;pointer-events:none;max-width:90vw;line-height:1.5;
}
.toast--hidden{opacity:0;transform:translateY(8px)}

#fwCanvas { position:fixed;inset:0;z-index:5;pointer-events:none; }

@media (max-width:480px) { .btn{padding:9px 16px;font-size:0.78rem}.btn-row{gap:6px} }
</style>
</head>
<body>

<!-- 入场提问遮罩 -->
<div id="gate" style="position:fixed;inset:0;z-index:999;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:32px;">
  <div id="gateQuestion" style="font-size:clamp(2rem,7vw,4rem);font-weight:800;color:#ff6b9d;text-shadow:0 0 40px rgba(255,107,157,0.5);letter-spacing:0.06em;transition:all 0.4s;">你爱我吗？</div>
  <div style="display:flex;gap:24px;position:relative;">
    <button id="gateYes" style="padding:14px 48px;font-size:clamp(1rem,3vw,1.4rem);font-weight:700;border:2px solid rgba(255,107,157,0.5);border-radius:50px;background:rgba(255,107,157,0.25);color:#ffb3c6;cursor:pointer;letter-spacing:0.06em;transition:all 0.3s;">是 💕</button>
    <button id="gateNo" style="padding:14px 48px;font-size:clamp(1rem,3vw,1.4rem);font-weight:700;border:2px solid rgba(255,255,255,0.2);border-radius:50px;background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.6);cursor:pointer;letter-spacing:0.06em;transition:all 0.15s;position:relative;">否</button>
  </div>
  <div id="gateHint" style="min-height:28px;font-size:0.9rem;color:rgba(255,255,255,0.4);letter-spacing:0.04em;"></div>
</div>

<canvas id="heartCanvas"></canvas>
<canvas id="sparkleCanvas"></canvas>
<canvas id="fwCanvas"></canvas>

<div class="header"><div class="title">乖乖我爱你</div></div>

<div class="footer">
  <div class="btn-row">
    <button class="btn btn--pink" id="btnFirework">🎆 烟花</button>
    <button class="btn btn--gold" id="btnBubble">💖 爱心雨</button>
    <button class="btn btn--purple" id="btnStar">✨ 星尘</button>
    <button class="btn" id="btnMessage">💌 情话</button>
    <button class="btn" id="btnMusic">A Thousand Years</button>
  </div>
  <div class="toast" id="toast">点击爱心有惊喜 · 按F放烟花</div>
</div>

<audio id="bgm" preload="auto" loop style="display:none">
  <source src="a-thousand-years.mp3" type="audio/mpeg">
</audio>

<script>
// ═══════════════════════════════════════════
//  入场提问
// ═══════════════════════════════════════════

const gateEl = document.getElementById('gate');
const gateYes = document.getElementById('gateYes');
const gateNo = document.getElementById('gateNo');
const gateQuestion = document.getElementById('gateQuestion');
const gateHint = document.getElementById('gateHint');
let gatePassed = false;

const rejectMessages = [
  '不行哦，再想想~', '真的吗？再给你一次机会', '我不信，重来！',
  '别这样嘛，重新选好不好', '你怎么忍心说出口...', '哼，我不接受！',
  '快选"是"啦~', '不可能！重新选！', '再试一次，我会等你的',
  '这不是正确答案哦', '哈哈，我知道你手滑了', '求求你了，选"是"吧'
];

let noClickCount = 0;

gateYes.addEventListener('click', () => {
  if (gatePassed) return;
  gatePassed = true;
  gateQuestion.textContent = '我就知道 💕';
  gateQuestion.style.transform = 'scale(1.1)';
  gateHint.textContent = '';
  gateHint.style.opacity = '0';
  gateNo.style.display = 'none';
  gateYes.textContent = '🥰 爱你';

  setTimeout(() => {
    gateEl.style.opacity = '0';
    gateEl.style.pointerEvents = 'none';
    gateEl.style.transition = 'opacity 0.8s';

    // 播放音乐
    bgm.play().then(() => {
      musicPlaying = true;
      document.getElementById('btnMusic').textContent = '🎵 暂停';
    }).catch(() => {});

    // 欢迎烟花
    setTimeout(() => launchFireworks(6), 400);
  }, 600);
});

gateNo.addEventListener('click', () => {
  if (gatePassed) return;
  noClickCount++;
  const msg = rejectMessages[Math.floor(Math.random() * rejectMessages.length)];
  gateHint.textContent = msg;
  gateHint.style.color = '#ff6b9d';
  gateHint.style.opacity = '1';

  // "否"按钮逃跑 — 每次点就跳到新位置
  const dx = (Math.random() * 260 - 130);
  const dy = (Math.random() * 120 - 60);
  gateNo.style.position = 'relative';
  gateNo.style.left = dx + 'px';
  gateNo.style.top = dy + 'px';

  // 如果连续拒绝多次，"是"按钮变大
  if (noClickCount >= 3) {
    const scale = 1 + noClickCount * 0.15;
    gateYes.style.transform = `scale(${scale})`;
    gateYes.style.fontSize = `clamp(1rem, 3vw, ${1.4 + noClickCount * 0.1}rem)`;
    gateYes.style.padding = `${14 + noClickCount * 2}px ${48 + noClickCount * 6}px`;
  }
});

gateYes.addEventListener('mouseenter', () => {
  if (!gatePassed) gateYes.style.transform = 'scale(1.08)';
});
gateYes.addEventListener('mouseleave', () => {
  if (!gatePassed) gateYes.style.transform = 'scale(1)';
});

// ═══════════════════════════════════════════
//  爱心粒子动画
// ═══════════════════════════════════════════

const heartCanvas = document.getElementById('heartCanvas');
const hCtx = heartCanvas.getContext('2d');

let CW, CH, CX, CY, IMAGE_ENLARGE;
function resizeHeartCanvas() {
  heartCanvas.width = CW = window.innerWidth;
  heartCanvas.height = CH = window.innerHeight;
  CX = CW / 2; CY = CH / 2;
  IMAGE_ENLARGE = Math.min(CW, CH) * 0.013;
}
resizeHeartCanvas();

const TAU = Math.PI * 2;

function heartXY(t, sr) {
  const x = 17 * Math.pow(Math.sin(t), 3);
  const y = -(16*Math.cos(t) - 5*Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t));
  return [x * sr + CX, y * sr + CY];
}

function scatterXY(x, y, beta) {
  const rx = -beta * Math.log(Math.random());
  const ry = -beta * Math.log(Math.random());
  return [x - rx*(x-CX), y - ry*(y-CY)];
}

function curve(p) { return (4*Math.sin(4*p))/TAU; }

// 预计算 60 帧平滑动画 (~22fps 实际渲染)
let frames = [];
const frameCount = 60;
const N_HEART = 600, N_CENTER = 3000, N_HALO_BASE = 800;

function buildHeartData() {
  frames = [];
  const hpts = [], edgePts = [], centerPts = [];

  for (let i = 0; i < N_HEART; i++) hpts.push(heartXY(Math.random()*TAU, IMAGE_ENLARGE));
  for (const [px,py] of hpts) for (let k=0;k<3;k++) edgePts.push(scatterXY(px,py,0.05));
  for (let i=0;i<N_CENTER;i++) {
    const [hx,hy] = hpts[Math.floor(Math.random()*N_HEART)];
    centerPts.push(scatterXY(hx,hy,0.27));
  }

  function forceCalc(px, py, ratio, jitter) {
    const d = 1 / Math.pow((px-CX)*(px-CX)+(py-CY)*(py-CY), 0.42);
    const jh = jitter >> 1;
    return [px - ratio*d*(px-CX) - (Math.floor(Math.random()*jitter)-jh),
            py - ratio*d*(py-CY) - (Math.floor(Math.random()*jitter)-jh)];
  }

  for (let f = 0; f < frameCount; f++) {
    const t = f / frameCount;
    const ratio = 15 * curve(t * TAU);
    const haloR = Math.floor(4 + 6*(1+curve(t*TAU)));
    const haloN = Math.floor(N_HALO_BASE + 1000*Math.abs(curve(t*TAU)**2));
    const arr = [];

    const haloSet = {};
    for (let i = 0; i < haloN; i++) {
      let [hx,hy] = heartXY(Math.random()*TAU, -15);
      const ds = (hx-CX)*(hx-CX)+(hy-CY)*(hy-CY);
      const fr = -1/Math.pow(ds, 0.6);
      hx -= fr*haloR*(hx-CX); hy -= fr*haloR*(hy-CY);
      const k = Math.round(hx)+','+Math.round(hy);
      if (!haloSet[k]) { haloSet[k]=1;
        hx += Math.floor(Math.random()*121)-60;
        hy += Math.floor(Math.random()*121)-60;
        arr.push(hx, hy, Math.random()<0.5?1:2);
      }
    }
    for (const [px,py] of hpts) { const [x,y]=forceCalc(px,py,ratio,3); arr.push(x,y,Math.floor(Math.random()*3)+1); }
    for (const [px,py] of edgePts) { const [x,y]=forceCalc(px,py,ratio,3); arr.push(x,y,Math.floor(Math.random()*2)+1); }
    for (const [px,py] of centerPts) { const [x,y]=forceCalc(px,py,ratio,3); arr.push(x,y,Math.floor(Math.random()*2)+1); }

    frames.push(arr);
  }
}
buildHeartData();

// 粉色爱心
const HEART_R = 0xff, HEART_G = 0x44, HEART_B = 0x70; // #ff4470
let imgData, lastFrameTime = 0;
const FRAME_MS = 44; // ~22fps, 60帧约2.7秒一个呼吸周期

function lerpFrame(fi) {
  const f0 = frames[Math.floor(fi) % frameCount];
  const f1 = frames[Math.ceil(fi) % frameCount];
  const t = fi - Math.floor(fi);
  // 只复制 f0，小幅度的帧间插值不做(肉眼看不出来)，直接跳到目标帧
  return f0;
}

function renderHeartFrame(fi) {
  if (!frames.length) return requestAnimationFrame(()=>renderHeartFrame(fi));

  const now = performance.now();
  if (now - lastFrameTime < FRAME_MS) {
    requestAnimationFrame(()=>renderHeartFrame(fi));
    return;
  }
  lastFrameTime = now;

  hCtx.clearRect(0,0,CW,CH);

  // 背景光晕
  hCtx.save();
  hCtx.globalAlpha = 0.07;
  const GR = Math.min(CW,CH)*0.28;
  const gg = hCtx.createRadialGradient(CX,CY,GR*0.3,CX,CY,GR);
  gg.addColorStop(0, '#ff4470');
  gg.addColorStop(0.5, 'rgba(255,68,112,0.18)');
  gg.addColorStop(1, 'transparent');
  hCtx.fillStyle = gg;
  hCtx.fillRect(0,0,CW,CH);
  hCtx.restore();

  const pts = frames[fi % frameCount];
  if (!pts) { requestAnimationFrame(()=>renderHeartFrame(fi)); return; }

  imgData = imgData || hCtx.createImageData(CW, CH);
  const buf = imgData.data;
  const len4 = CW*CH*4;
  for (let i=3;i<len4;i+=4) { buf[i]=0; buf[i-1]=0; buf[i-2]=0; }

  for (let i=0;i<pts.length;i+=3) {
    const x=pts[i]|0, y=pts[i+1]|0, s=pts[i+2]|0;
    for (let dy=0;dy<s;dy++) {
      const row=y+dy; if (row<0||row>=CH) continue;
      const off=row*CW*4;
      for (let dx=0;dx<s;dx++) {
        const col=x+dx; if (col<0||col>=CW) continue;
        const idx=off+col*4;
        buf[idx]=HEART_R; buf[idx+1]=HEART_G; buf[idx+2]=HEART_B; buf[idx+3]=255;
      }
    }
  }
  hCtx.putImageData(imgData,0,0);

  requestAnimationFrame(()=>renderHeartFrame(fi+1));
}

// ═══════════════════════════════════════════
//  优雅粒子特效 (替代 emoji)
// ═══════════════════════════════════════════

const sparkleCanvas = document.getElementById('sparkleCanvas');
const spCtx = sparkleCanvas.getContext('2d');
sparkleCanvas.width = window.innerWidth;
sparkleCanvas.height = window.innerHeight;

let sparkles = [];

class Sparkle {
  constructor(x, y, color) {
    this.x = x; this.y = y; this.vx = (Math.random()-0.5)*2;
    this.vy = -(Math.random()*3+1.5);
    this.color = color || ['#ff6b9d','#ffb3c6','#ffd740','#ff8c00','#c084fc','#22d3ee'][Math.floor(Math.random()*6)];
    this.life = 1; this.decay = Math.random()*0.012+0.006;
    this.size = Math.random()*3+1.5;
    this.glow = Math.random()*0.6+0.4;
  }
  update() {
    this.x += this.vx; this.y += this.vy; this.vy += 0.02;
    this.life -= this.decay;
    return this.life > 0;
  }
  draw(ctx) {
    const a = Math.max(0, this.life);
    ctx.save();
    ctx.globalAlpha = a * this.glow;
    ctx.fillStyle = this.color;
    ctx.shadowBlur = 8 * a;
    ctx.shadowColor = this.color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * a, 0, TAU);
    ctx.fill();
    ctx.restore();
  }
}

function emitSparkles(x, y, count, colors) {
  for (let i=0;i<count;i++) {
    const sp = new Sparkle(x+(Math.random()-0.5)*30, y+(Math.random()-0.5)*30);
    if (colors) sp.color = colors[Math.floor(Math.random()*colors.length)];
    sparkles.push(sp);
  }
}

function animSparkles() {
  spCtx.clearRect(0,0,sparkleCanvas.width,sparkleCanvas.height);
  sparkles = sparkles.filter(s => { const alive=s.update(); if(alive)s.draw(spCtx); return alive; });
  requestAnimationFrame(animSparkles);
}
animSparkles();

// ═══════════════════════════════════════════
//  烟花系统
// ═══════════════════════════════════════════

const fwCanvas = document.getElementById('fwCanvas');
const fwCtx = fwCanvas.getContext('2d');
let fireworks = [];

function resizeFw() {
  fwCanvas.width = window.innerWidth;
  fwCanvas.height = window.innerHeight;
}
resizeFw();

class Rocket {
  constructor(x, targetY) {
    this.x=x;this.y=window.innerHeight;this.targetY=targetY;
    this.speed=7+Math.random()*5;this.trail=[];
    this.color=['#ff3060','#ffd740','#ff8c00','#c084fc','#22d3ee','#f472b6'][Math.floor(Math.random()*6)];
  }
  update(){
    this.trail.push({x:this.x,y:this.y,life:1});
    if(this.trail.length>18) this.trail.shift();
    this.y-=this.speed;this.trail.forEach(t=>t.life-=0.055);
    return this.y<=this.targetY;
  }
  draw(ctx){
    this.trail.forEach(t=>{
      ctx.save();ctx.globalAlpha=t.life*0.5;ctx.fillStyle=this.color;ctx.shadowBlur=6;ctx.shadowColor=this.color;
      ctx.beginPath();ctx.arc(t.x,t.y,2,0,TAU);ctx.fill();ctx.restore();
    });
    ctx.save();ctx.fillStyle='#fff';ctx.shadowBlur=14;ctx.shadowColor=this.color;
    ctx.beginPath();ctx.arc(this.x,this.y,3.5,0,TAU);ctx.fill();ctx.restore();
  }
}

class Spark {
  constructor(x,y,color){
    this.x=x;this.y=y;const a=Math.random()*TAU;const s=Math.random()*7+2;
    this.vx=Math.cos(a)*s;this.vy=Math.sin(a)*s;
    this.color=color;this.life=1;this.decay=Math.random()*0.016+0.005;
    this.size=Math.random()*2.2+0.6;this.g=0.025;this.fr=0.987;
  }
  update(){this.x+=this.vx;this.y+=this.vy;this.vy+=this.g;this.vx*=this.fr;this.vy*=this.fr;this.life-=this.decay;}
  draw(ctx){
    ctx.save();ctx.globalAlpha=Math.max(0,this.life);ctx.fillStyle=this.color;ctx.shadowBlur=5;ctx.shadowColor=this.color;
    ctx.beginPath();ctx.arc(this.x,this.y,this.size*this.life,0,TAU);ctx.fill();ctx.restore();
  }
}

class Burst {
  constructor(x,y){
    this.sparks=[];const c=['#ff3060','#ff6b9d','#ffd740','#ff8c00','#c084fc','#22d3ee','#f472b6','#fbbf24'];
    const p=[c[Math.floor(Math.random()*c.length)],c[Math.floor(Math.random()*c.length)],c[Math.floor(Math.random()*c.length)]];
    for(let i=0;i<130;i++) this.sparks.push(new Spark(x,y,p[Math.floor(Math.random()*3)]));
  }
  update(){this.sparks.forEach(s=>s.update());this.sparks=this.sparks.filter(s=>s.life>0);}
  draw(ctx){this.sparks.forEach(s=>s.draw(ctx));}
  get done(){return this.sparks.length===0;}
}

function launchFireworks(n){
  for(let i=0;i<n;i++) setTimeout(()=>{
    const x=window.innerWidth*0.1+Math.random()*window.innerWidth*0.8;
    const ty=window.innerHeight*0.06+Math.random()*window.innerHeight*0.4;
    fireworks.push({type:'r',obj:new Rocket(x,ty)});
  },i*140);
}

function animFw(){
  fwCtx.clearRect(0,0,fwCanvas.width,fwCanvas.height);
  const nf=[];
  for(const f of fireworks){
    if(f.type==='r'){
      if(f.obj.update()) nf.push({type:'b',obj:new Burst(f.obj.x,f.obj.y)});
      else {f.obj.draw(fwCtx);nf.push(f);}
    } else {f.obj.update();f.obj.draw(fwCtx);if(!f.obj.done) nf.push(f);}
  }
  fireworks=nf;requestAnimationFrame(animFw);
}
animFw();

// ═══════════════════════════════════════════
//  Toast
// ═══════════════════════════════════════════

const toastEl=document.getElementById('toast');
let toastTimer;
function showToast(m){
  clearTimeout(toastTimer);
  toastEl.classList.remove('toast--hidden');toastEl.textContent=m;
  toastTimer=setTimeout(()=>toastEl.classList.add('toast--hidden'),3000);
}

function showRandomMessage(){
  const m=['在这个世界上，最幸运的事就是遇见你','乖乖，你的笑容是我每天的阳光','无论多远，我的心都和你在一起','你是我生命中最美好的意外','每一天都想对你说：我爱你','你是我的心跳，是我的唯一','想和你一起慢慢变老','乖乖是这个世界上最可爱的人','遇见你，是我这辈子最大的幸运','春风十里不如你','你就是我的全世界','和你在一起的每一秒都很甜','愿做你的守护星，永远闪亮','陪你看遍世间所有美好','爱你就像爱生命'];
  showToast(m[Math.floor(Math.random()*m.length)]);
}

// ═══════════════════════════════════════════
//  音乐 — A Thousand Years (MP3播放)
//  ═══════════════════════════════════════════

const bgm = document.getElementById('bgm');
let musicPlaying = false;

function toggleMusic() {
  if (musicPlaying) {
    bgm.pause();
    musicPlaying = false;
    document.getElementById('btnMusic').textContent = '🎵 A Thousand Years';
    showToast('音乐已暂停');
  } else {
    bgm.play().then(() => {
      musicPlaying = true;
      document.getElementById('btnMusic').textContent = '🎵 暂停';
      showToast('A Thousand Years ♪');
    }).catch(() => {
      showToast('音乐加载失败，请确保 a-thousand-years.mp3 在同目录下');
    });
  }
}

// ═══════════════════════════════════════════
//  交互: 点击爱心
// ═══════════════════════════════════════════

heartCanvas.addEventListener('click', (e) => {
  emitSparkles(e.clientX, e.clientY, 18, ['#ff6b9d','#ff4470','#ffb3c6','#ffd740']);
  launchFireworks(3);
  const msgs = ['乖乖最好啦~','好爱好爱你','为你心动','爱的抱抱','亲一个'];
  showToast(msgs[Math.floor(Math.random()*msgs.length)]);
});

heartCanvas.addEventListener('dblclick', (e) => {
  e.preventDefault();
  launchFireworks(10);
  emitSparkles(e.clientX, e.clientY, 40, ['#ff6b9d','#ff4470','#ffd740','#c084fc','#22d3ee']);
  showToast('满满的爱都给你');
});

// ═══════════════════════════════════════════
//  按钮绑定
// ═══════════════════════════════════════════

document.getElementById('btnFirework').addEventListener('click',()=>{
  launchFireworks(12);showToast('为你绽放最美的烟花');
});
document.getElementById('btnBubble').addEventListener('click',()=>{
  const cx=window.innerWidth/2,cy=window.innerHeight*0.42;
  for(let i=0;i<8;i++) setTimeout(()=>emitSparkles(cx+(Math.random()-0.5)*220,cy+(Math.random()-0.5)*160,10,['#ff6b9d','#ffb3c6','#ff4470']),i*100);
  showToast('爱你一万遍');
});
document.getElementById('btnStar').addEventListener('click',()=>{
  launchFireworks(6);
  for(let i=0;i<40;i++) setTimeout(()=>emitSparkles(Math.random()*innerWidth*0.8+innerWidth*0.1,Math.random()*innerHeight*0.35+innerHeight*0.05,4,['#ffd740','#c084fc','#22d3ee']),i*35);
  showToast('满天繁星，不如你眼睛里的光');
});
document.getElementById('btnMessage').addEventListener('click',showRandomMessage);
document.getElementById('btnMusic').addEventListener('click',toggleMusic);

// 键盘
window.addEventListener('keydown',e=>{
  switch(e.key.toLowerCase()){
    case'f':launchFireworks(10);showToast('为你绽放！');break;
    case'b':emitSparkles(innerWidth/2,innerHeight/2,30,['#ff6b9d','#ff4470','#ffb3c6']);showToast('爱心雨！');break;
    case'm':showRandomMessage();break;
  }
});

// 窗口大小变化
window.addEventListener('resize', () => {
  resizeHeartCanvas();
  resizeFw();
  sparkleCanvas.width = window.innerWidth;
  sparkleCanvas.height = window.innerHeight;
  buildHeartData();
});

// 启动爱心动画
renderHeartFrame(0);

// 欢迎烟花
setTimeout(()=>launchFireworks(4), 800);
</script>
</body>

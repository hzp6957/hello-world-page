<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>乖乖我爱你</title>
<style>
:root { --bg: #06060f; --text: rgba(255,255,255,0.9); --text-dim: rgba(255,255,255,0.5); }

* { margin:0;padding:0;box-sizing:border-box; }

body {
  width:100vw;height:100dvh;overflow:hidden;
  background:var(--bg);
  font-family:"PingFang SC","Microsoft YaHei",-apple-system,sans-serif;

  user-select:none;-webkit-user-select:none;
}

#threeCanvas { position:fixed;inset:0;z-index:0; }

/* 标题 */
.header { position:fixed;top:0;left:0;right:0;z-index:10;padding:clamp(14px,3vh,28px) 24px;display:flex;justify-content:center;pointer-events:none; }
.title-group { text-align:center; }
.title {
  font-size:clamp(1.5rem,5vw,3rem);font-weight:800;letter-spacing:0.1em;

/* 底部 */
.footer { position:fixed;bottom:clamp(12px,3vh,36px);left:0;right:0;z-index:10;display:flex;flex-direction:column;align-items:center;gap:10px;padding:0 16px; }

  padding:10px 22px;border:1px solid rgba(255,255,255,0.1);border-radius:40px;
  background:rgba(255,255,255,0.04);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  color:var(--text);font-size:clamp(0.78rem,2vw,0.9rem);font-weight:600;
  font-family:inherit;letter-spacing:0.04em;cursor:pointer;transition:all 0.25s;white-space:nowrap;
}
.btn:active{transform:scale(0.94)}
.btn--pink{background:rgba(255,45,105,0.2);border-color:rgba(255,45,105,0.35)}
.btn--pink:hover{background:rgba(255,45,105,0.32);box-shadow:0 0 28px rgba(255,45,105,0.2)}
.btn--gold{background:rgba(255,180,40,0.16);border-color:rgba(255,180,40,0.3)}
.btn--gold:hover{background:rgba(255,180,40,0.28);box-shadow:0 0 28px rgba(255,180,40,0.18)}
.btn--purple{background:rgba(140,80,255,0.16);border-color:rgba(140,80,255,0.3)}

@media (min-width:768px) {
  .btn:hover{transform:translateY(-2px);background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.2)}
  .btn--pink:hover{transform:translateY(-2px)}
  .btn--gold:hover{transform:translateY(-2px)}
  .btn--purple:hover{transform:translateY(-2px)}
}

.toast {
  padding:10px 26px;border-radius:40px;background:rgba(255,255,255,0.05);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,0.06);
  color:var(--text);font-size:clamp(0.75rem,2vw,0.85rem);text-align:center;
  letter-spacing:0.04em;transition:opacity 0.45s,transform 0.45s;pointer-events:none;max-width:90vw;line-height:1.5;
}
.toast--hidden{opacity:0;transform:translateY(8px)}

#fwCanvas { position:fixed;inset:0;z-index:5;pointer-events:none; }

@media (max-width:480px) { .btn{padding:9px 16px;font-size:0.78rem}.btn-row{gap:6px} }
</style>

<body>

<div class="header">

</div>

<script type="importmap">
{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }

<script type="module">
import * as THREE from 'three';

// ═══ CANVAS ═══
const canvas3d = document.getElementById('threeCanvas');
const renderer = new THREE.WebGLRenderer({ canvas:canvas3d, antialias:true, alpha:true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.3;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(40, window.innerWidth/window.innerHeight, 0.1, 60);
camera.position.z = 8;

// ═══ 灯光 ═══
scene.add(new THREE.AmbientLight('#332244', 2));
const k1 = new THREE.DirectionalLight('#ffffff', 5); k1.position.set(4,3,7); scene.add(k1);
const k2 = new THREE.DirectionalLight('#ff6688', 3.5); k2.position.set(-4,0,-3); scene.add(k2);
const k3 = new THREE.DirectionalLight('#ffaacc', 2.5); k3.position.set(0,5,1); scene.add(k3);
const k4 = new THREE.DirectionalLight('#6644bb', 1.8); k4.position.set(0,-3,2); scene.add(k4);
const p1 = new THREE.PointLight('#ff3366', 30, 5); p1.position.set(0,1.5,1.2); scene.add(p1);
const p2 = new THREE.PointLight('#ff6688', 20, 6); p2.position.set(0,-0.5,-2); scene.add(p2);

// ═══ 真正 3D 爱心 (参数曲面) ═══
// 心形隐式方程: (x² + 9/4 y² + z² - 1)³ = x²z³ + 9/80 y²z³
// 用球坐标采样 + 牛顿法求根得到表面点

function heartImplicit(x,y,z) {
  const a = x*x + 2.25*y*y + z*z - 1;
  return a*a*a - x*x*z*z*z - (9/80)*y*y*z*z*z;
}

// 用 marching 在球坐标上采样
function sampleHeartSurface(nTheta, nPhi) {
  const verts = [];
  const normals = [];
  const indices = [];

  // 在球面上采样方向，用牛顿法收敛到曲面
  const points = [];
  for (let i = 0; i <= nTheta; i++) {
    const row = [];
    const theta = (i / nTheta) * Math.PI; // 0..PI (极角，从顶到底)
    for (let j = 0; j <= nPhi; j++) {
      const phi = (j / nPhi) * Math.PI * 2; // 0..2PI (方位角)
      // 初始猜测：心形包围球半径 ~1.3
      let r = 1.2;
      // 牛顿法求根
      for (let iter = 0; iter < 8; iter++) {
        const x = r * Math.sin(theta) * Math.cos(phi);
        const y = r * Math.sin(theta) * Math.sin(phi);
        const z = r * Math.cos(theta);
        const f = heartImplicit(x, y, z);
        // 数值梯度
        const eps = 0.0005;
        const fx = heartImplicit(x+eps,y,z);
        const fy = heartImplicit(x,y+eps,z);
        const fz = heartImplicit(x,y,z+eps);
        const grad = [(fx-f)/eps, (fy-f)/eps, (fz-f)/eps];
        const gradNorm = Math.sqrt(grad[0]**2 + grad[1]**2 + grad[2]**2);
        if (gradNorm < 1e-10) break;
        // 沿方向导数
        const dx = Math.sin(theta)*Math.cos(phi);
        const dy = Math.sin(theta)*Math.sin(phi);
        const dz = Math.cos(theta);
        const dfdr = grad[0]*dx + grad[1]*dy + grad[2]*dz;
        if (Math.abs(dfdr) < 1e-10) break;
        r -= f / dfdr;
        if (r < 0.2) r = 0.2;
        if (r > 3.0) r = 3.0;
      }
      const x = r * Math.sin(theta) * Math.cos(phi);
      const y = r * Math.sin(theta) * Math.sin(phi);
      const z = r * Math.cos(theta);
      row.push({x,y,z});
    }
    points.push(row);
  }

  // 构建网格
  const eps = 0.003;
  const getNormal = (p) => {
    const fx = heartImplicit(p.x+eps, p.y, p.z) - heartImplicit(p.x-eps, p.y, p.z);
    const fy = heartImplicit(p.x, p.y+eps, p.z) - heartImplicit(p.x, p.y-eps, p.z);
    const fz = heartImplicit(p.x, p.y, p.z+eps) - heartImplicit(p.x, p.y, p.z-eps);
    const n = new THREE.Vector3(fx, fy, fz).normalize();
    return n;
  };

  for (let i = 0; i <= nTheta; i++) {
    for (let j = 0; j <= nPhi; j++) {
      const p = points[i][j];
      const n = getNormal(p);
      verts.push(p.x, p.y, p.z);
      normals.push(n.x, n.y, n.z);
    }
  }

  for (let i = 0; i < nTheta; i++) {
    for (let j = 0; j < nPhi; j++) {
      const a = i * (nPhi+1) + j;
      const b = a + 1;
      const c = a + (nPhi+1);
      const d = c + 1;
      indices.push(a,b,d); indices.push(a,d,c);
    }
  }

  return { verts:new Float32Array(verts), normals:new Float32Array(normals), indices:new Uint32Array(indices) };
}

const heartData = sampleHeartSurface(140, 140);

const heartGeom = new THREE.BufferGeometry();
heartGeom.setAttribute('position', new THREE.BufferAttribute(heartData.verts, 3));
heartGeom.setAttribute('normal', new THREE.BufferAttribute(heartData.normals, 3));
heartGeom.setIndex(new THREE.BufferAttribute(heartData.indices, 1));
heartGeom.computeTangents();

// 爱心主体材质 — 半透明玻璃玫瑰金
const heartMat = new THREE.MeshPhysicalMaterial({
  color: '#ff2d60',
  metalness: 0.02,
  roughness: 0.12,
  clearcoat: 0.45,
  clearcoatRoughness: 0.15,
  specularIntensity: 1.4,
  specularColor: '#ff8899',
  ior: 1.5,
  reflectivity: 0.6,
  emissive: '#220008',
  emissiveIntensity: 0.35,
  envMapIntensity: 0.4,
});

const heartMesh = new THREE.Mesh(heartGeom, heartMat);
heartMesh.scale.set(1.8, 1.8, 1.8);
scene.add(heartMesh);

// 爱心光晕层 (稍微放大，半透明粉色)
const glowGeom = new THREE.BufferGeometry();
const glowVerts = new Float32Array(heartData.verts.length);
for (let i = 0; i < heartData.verts.length; i++) glowVerts[i] = heartData.verts[i] * 1.06;
glowGeom.setAttribute('position', new THREE.BufferAttribute(glowVerts, 3));
glowGeom.setIndex(new THREE.BufferAttribute(heartData.indices, 1));
const glowMat = new THREE.MeshBasicMaterial({
  color: '#ff4470', transparent:true, opacity:0.12, side:THREE.BackSide, depthWrite:false,
});
const glowMesh = new THREE.Mesh(glowGeom, glowMat);
glowMesh.scale.copy(heartMesh.scale);
scene.add(glowMesh);

// ═══ 粒子螺旋轨道 ═══
const orbitGroup = new THREE.Group();
scene.add(orbitGroup);

// 螺旋轨道1 - 绕Y轴
function createOrbit(radiusFn, yScale, count, color, size, speed) {
  const geom = new THREE.BufferGeometry();
  const positions = new Float32Array(count * 3);
  const sizes = new Float32Array(count);
  const speeds = new Float32Array(count);
  for (let i = 0; i < count; i++) {
    const t = (i/count) * Math.PI * 2;
    const r = typeof radiusFn === 'function' ? radiusFn(t) : radiusFn;
    const x = Math.cos(t) * r;
    const z = Math.sin(t) * r;
    const y = Math.sin(t * 2) * yScale + Math.cos(t*3) * yScale*0.4;
    positions[i*3] = x; positions[i*3+1] = y; positions[i*3+2] = z;
    sizes[i] = Math.random()*size*0.6 + size*0.4;
    speeds[i] = speed + Math.random()*0.3;
  }
  geom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geom.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
  const mat = new THREE.PointsMaterial({
    color, size:0.025, blending:THREE.AdditiveBlending, depthWrite:false, transparent:true, opacity:0.75,
  });
  const points = new THREE.Points(geom, mat);
  points.userData = { speeds, basePositions: new Float32Array(positions), count };
  return points;
}

const orbit1 = createOrbit(2.2, 0.5, 400, '#ff6688', 1, 0.5);
const orbit2 = createOrbit(t => 1.9 + Math.sin(t*3)*0.15, 0.6, 350, '#ff8899', 0.9, 0.7);
const orbit3 = createOrbit(2.5, 0.3, 300, '#ffaacc', 0.8, 0.4);
orbitGroup.add(orbit1); orbitGroup.add(orbit2); orbitGroup.add(orbit3);

// 粒子流光环
const ringGeom = new THREE.BufferGeometry();
const ringCount = 600;
const ringPos = new Float32Array(ringCount*3);
for (let i = 0; i < ringCount; i++) {
  const angle = Math.random()*Math.PI*2;
  const r = 2.6 + Math.random()*0.5;
  ringPos[i*3] = Math.cos(angle)*r;
  ringPos[i*3+1] = (Math.random()-0.5)*0.15;
  ringPos[i*3+2] = Math.sin(angle)*r;
}
ringGeom.setAttribute('position', new THREE.BufferAttribute(ringPos, 3));
const ringMat = new THREE.PointsMaterial({
  color:'#ff6699', size:0.02, blending:THREE.AdditiveBlending, depthWrite:false, transparent:true, opacity:0.5,
});
const ring = new THREE.Points(ringGeom, ringMat);
scene.add(ring);

// ═══ 背景粒子场 ═══
const bgGeom = new THREE.BufferGeometry();
const bgCount = 800;
const bgPositions = new Float32Array(bgCount*3);
for (let i = 0; i < bgCount; i++) {
  // 球壳分布
  const phi = Math.acos(2*Math.random()-1);
  const theta = Math.random()*Math.PI*2;
  const r = 5 + Math.random()*10;
  bgPositions[i*3] = Math.sin(phi)*Math.cos(theta)*r;
  bgPositions[i*3+1] = Math.sin(phi)*Math.sin(theta)*r;
  bgPositions[i*3+2] = Math.cos(phi)*r;
}
bgGeom.setAttribute('position', new THREE.BufferAttribute(bgPositions, 3));
const bgMat = new THREE.PointsMaterial({
  color:'#ffffff', size:0.03, blending:THREE.AdditiveBlending, depthWrite:false, transparent:true, opacity:0.5,
});
const bgStars = new THREE.Points(bgGeom, bgMat);
scene.add(bgStars);

// ═══ 交互控制 ═══
let isDragging = false;
let prevMouse = {x:0, y:0};
let targetRotY = 0.15, targetRotX = -0.1;
let currentRotY = 0.15, currentRotX = -0.1;
let autoRotate = true;
let autoAngle = 0;
let targetZoom = 8, currentZoom = 8;

canvas3d.addEventListener('pointerdown', (e) => {
  isDragging = true; autoRotate = false;
  prevMouse = {x:e.clientX, y:e.clientY};
  canvas3d.setPointerCapture(e.pointerId);
});

canvas3d.addEventListener('pointermove', (e) => {
  if (!isDragging) return;
  const dx = e.clientX - prevMouse.x;
  const dy = e.clientY - prevMouse.y;
  targetRotY += dx*0.005;
  targetRotX += dy*0.005;
  targetRotX = Math.max(-1.2, Math.min(1.2, targetRotX));
  prevMouse = {x:e.clientX, y:e.clientY};
});

canvas3d.addEventListener('pointerup', () => {
  isDragging = false;
  setTimeout(() => { if (!isDragging) autoRotate = true; }, 600);
});

canvas3d.addEventListener('wheel', (e) => {
  e.preventDefault();
  targetZoom += e.deltaY*0.005;
  targetZoom = Math.max(4, Math.min(16, targetZoom));
}, {passive:false});

// 双击
canvas3d.addEventListener('dblclick', (e) => {
  e.preventDefault();
  launchFireworks(10);
  showToast('满满的爱都给你 💖');
});

// 触摸双击
let lastTap = 0;
canvas3d.addEventListener('touchend', () => {
  const now = Date.now();
  if (now-lastTap < 300 && !isDragging) {
    launchFireworks(10);
    showToast('满满的爱都给你 💖');
  }
  lastTap = now;
});

// ═══ 烟花系统 ═══
const fwCanvas = document.getElementById('fwCanvas');
const fwCtx = fwCanvas.getContext('2d');
let fireworks = [];

function resizeFw(){ fwCanvas.width=window.innerWidth; fwCanvas.height=window.innerHeight; }
resizeFw();

class Rocket {
  constructor(x, targetY) {
    this.x=x;this.y=window.innerHeight;this.targetY=targetY;
    this.speed=7+Math.random()*5;this.trail=[];
    this.color=['#ff3060','#ffd740','#ff8c00','#c084fc','#22d3ee','#f472b6'][Math.floor(Math.random()*6)];
  }
  update(){
    this.trail.push({x:this.x,y:this.y,life:1});
    if(this.trail.length>18) this.trail.shift();
    this.y-=this.speed;this.trail.forEach(t=>t.life-=0.055);
    return this.y<=this.targetY;
  }
  draw(ctx){
    this.trail.forEach(t=>{
      ctx.save();ctx.globalAlpha=t.life*0.5;ctx.fillStyle=this.color;ctx.shadowBlur=6;ctx.shadowColor=this.color;
      ctx.beginPath();ctx.arc(t.x,t.y,2,0,Math.PI*2);ctx.fill();ctx.restore();
    });
    ctx.save();ctx.fillStyle='#fff';ctx.shadowBlur=14;ctx.shadowColor=this.color;
    ctx.beginPath();ctx.arc(this.x,this.y,3.5,0,Math.PI*2);ctx.fill();ctx.restore();
  }
}

class Spark {
  constructor(x,y,color){
    this.x=x;this.y=y;const a=Math.random()*Math.PI*2;const s=Math.random()*7+2;
    this.vx=Math.cos(a)*s;this.vy=Math.sin(a)*s;
    this.color=color;this.life=1;this.decay=Math.random()*0.016+0.005;
    this.size=Math.random()*2.2+0.6;this.g=0.025;this.fr=0.987;
  }
  update(){this.x+=this.vx;this.y+=this.vy;this.vy+=this.g;this.vx*=this.fr;this.vy*=this.fr;this.life-=this.decay;}
  draw(ctx){
    ctx.save();ctx.globalAlpha=Math.max(0,this.life);ctx.fillStyle=this.color;ctx.shadowBlur=5;ctx.shadowColor=this.color;
    ctx.beginPath();ctx.arc(this.x,this.y,this.size*this.life,0,Math.PI*2);ctx.fill();ctx.restore();
  }
}

class Burst {
  constructor(x,y){
    this.sparks=[];const c=['#ff3060','#ff6b9d','#ffd740','#ff8c00','#c084fc','#22d3ee','#f472b6','#fbbf24'];
    const p=[c[Math.floor(Math.random()*c.length)],c[Math.floor(Math.random()*c.length)],c[Math.floor(Math.random()*c.length)]];
    for(let i=0;i<130;i++) this.sparks.push(new Spark(x,y,p[Math.floor(Math.random()*3)]));
  }
  update(){this.sparks.forEach(s=>s.update());this.sparks=this.sparks.filter(s=>s.life>0);}
  draw(ctx){this.sparks.forEach(s=>s.draw(ctx));}
  get done(){return this.sparks.length===0;}
}

function launchFireworks(n){
  for(let i=0;i<n;i++) setTimeout(()=>{
    const x=window.innerWidth*0.1+Math.random()*window.innerWidth*0.8;
    const ty=window.innerHeight*0.06+Math.random()*window.innerHeight*0.4;
    fireworks.push({type:'r',obj:new Rocket(x,ty)});
  },i*140);
}

function animFw(){
  fwCtx.clearRect(0,0,fwCanvas.width,fwCanvas.height);
  const nf=[];
  for(const f of fireworks){
    if(f.type==='r'){
      if(f.obj.update()) nf.push({type:'b',obj:new Burst(f.obj.x,f.obj.y)});
      else {f.obj.draw(fwCtx);nf.push(f);}
    } else {f.obj.update();f.obj.draw(fwCtx);if(!f.obj.done) nf.push(f);}
  }
  fireworks=nf;requestAnimationFrame(animFw);
}
animFw();

// ═══ 爱心泡泡 ═══
function spawnBubbles(x,y,n){
  const t=['❤️','💖','💕','💗','💝','💘','✨','💌','🩷','💓','🌟'];
  for(let i=0;i<n;i++){
    const el=document.createElement('div');
    el.style.cssText=`position:fixed;pointer-events:none;z-index:20;left:${x+(Math.random()-0.5)*40}px;top:${y+(Math.random()-0.5)*40}px;font-size:${Math.random()*2+1.2}rem;animation:bubbleFloat ${Math.random()*1+1.2}s ease-out forwards;animation-delay:${Math.random()*0.3}s;`;
    el.textContent=t[Math.floor(Math.random()*t.length)];
    document.body.appendChild(el);
    el.addEventListener('animationend',()=>el.remove());
  }
}

const bs=document.createElement('style');
bs.textContent=`@keyframes bubbleFloat{0%{transform:translate(0,0) scale(0.15);opacity:1}40%{transform:translate(${Math.random()*160-80}px,-70px) scale(1.35);opacity:0.85}100%{transform:translate(${Math.random()*200-100}px,-180px) scale(0.35);opacity:0}}`;
document.head.appendChild(bs);

// ═══ Toast ═══
const toastEl=document.getElementById('toast');
let toastTimer;
function showToast(m){
  clearTimeout(toastTimer);
  toastEl.classList.remove('toast--hidden');toastEl.textContent=m;
  toastTimer=setTimeout(()=>toastEl.classList.add('toast--hidden'),3000);
}

function showRandomMessage(){

// ═══ 音乐 (卡农 多轨) ═══
let audioCtx=null,musicPlaying=false,musicTimer=null;

function toggleMusic(){
  if(!audioCtx){try{audioCtx=new(window.AudioContext||window.webkitAudioContext)()}catch(e){return}}
  if(musicPlaying){clearTimeout(musicTimer);musicPlaying=false;document.getElementById('btnMusic').textContent='🎵 卡农';showToast('音乐已暂停');return}
  musicPlaying=true;document.getElementById('btnMusic').textContent='🎵 暂停';showToast('正在演奏卡农 ♪');

  const melody=[294,329,370,392,440,392,370,329,294,220,247,262,294,262,247,220,196,220,247,294,329,294,247,220,196,220,247,294,329,294,247,262,294,329,370,392,440,392,370,329,294,262,247,220,196,220,247,294];
  const bass=[147,110,98,130,147,110,98,130,147,110,98,130,147,110,98,130];
  const chordRoots=[147,110,98,130,147,110,98,130,147,110,98,130,147,110,98,130];
  const chordIntervals=[4,3,4,3,4,3,3,4,4,3,4,3,4,3,3,4];
  const noteLen=0.38;let idx=0;

  function playChord(root,interval){
    [root,root*Math.pow(2,interval/12),root*Math.pow(2,7/12)].forEach((f,j)=>{
      const o=audioCtx.createOscillator(),g=audioCtx.createGain();
      o.type=j===0?'triangle':'sine';o.frequency.value=f;
      g.gain.setValueAtTime(j===0?0.07:0.04,audioCtx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+noteLen*0.8);
      o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+noteLen*0.8);
    });
  }

  function pn(){
    if(!musicPlaying||!audioCtx)return;
    const mi=idx%melody.length;
    // melody
    const o1=audioCtx.createOscillator(),g1=audioCtx.createGain();
    o1.type='sine';o1.frequency.value=melody[mi];
    g1.gain.setValueAtTime(0.11,audioCtx.currentTime);
    g1.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+noteLen*0.85);
    o1.connect(g1);g1.connect(audioCtx.destination);o1.start();o1.stop(audioCtx.currentTime+noteLen*0.85);
    // overtone
    const o2=audioCtx.createOscillator(),g2=audioCtx.createGain();
    o2.type='sine';o2.frequency.value=melody[mi]*2;
    g2.gain.setValueAtTime(0.025,audioCtx.currentTime);
    g2.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+noteLen*0.65);
    o2.connect(g2);g2.connect(audioCtx.destination);o2.start();o2.stop(audioCtx.currentTime+noteLen*0.65);
    // chord
    if(mi%4===0) playChord(chordRoots[Math.floor(mi/4)%chordRoots.length], chordIntervals[Math.floor(mi/4)%16]);
    // bass
    if(mi%2===0){
      const ob=audioCtx.createOscillator(),gb=audioCtx.createGain();
      ob.type='triangle';ob.frequency.value=bass[Math.floor(mi/2)%bass.length];
      gb.gain.setValueAtTime(0.06,audioCtx.currentTime);
      gb.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+noteLen*1.5);
      ob.connect(gb);gb.connect(audioCtx.destination);ob.start();ob.stop(audioCtx.currentTime+noteLen*1.5);
    }
    idx++;
    musicTimer=setTimeout(pn,noteLen*1000);
  }
  pn();
}

// ═══ 渲染循环 ═══
const clock = new THREE.Clock();

function animate(){
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.1);

  // 旋转
  if(autoRotate){autoAngle+=0.3*dt;targetRotY=Math.sin(autoAngle)*0.6;targetRotX=-0.1+Math.cos(autoAngle*1.3)*0.1}
  currentRotY+=(targetRotY-currentRotY)*4*dt;
  currentRotX+=(targetRotX-currentRotX)*4*dt;
  currentZoom+=(targetZoom-currentZoom)*4*dt;

  heartMesh.rotation.y=currentRotY;heartMesh.rotation.x=currentRotX;
  glowMesh.rotation.copy(heartMesh.rotation);glowMesh.scale.copy(heartMesh.scale);

  // 轨道粒子动画
  [orbit1, orbit2, orbit3].forEach(pts => {
    pts.rotation.y += 0.15 * dt;
    pts.rotation.x += 0.08 * dt;
  });
  ring.rotation.y += 0.2 * dt; ring.rotation.z += 0.1 * dt;

  // 背景星星微动
  bgStars.rotation.y += 0.02 * dt; bgStars.rotation.x += 0.01 * dt;

  // 呼吸
  const t = Date.now()*0.001;
  const b = 1+Math.sin(t*1.8)*0.018;
  heartMesh.scale.setScalar(1.8*b);
  glowMat.opacity = 0.1+Math.sin(t*2.5)*0.03;
  p1.intensity = 28+Math.sin(t*2)*6;
  heartMat.emissiveIntensity = 0.3+Math.sin(t*2)*0.12;

  // 相机
  camera.position.z = currentZoom;
  camera.lookAt(0, 0, 0);

  renderer.render(scene, camera);
}
animate();

// 欢迎烟花
setTimeout(()=>launchFireworks(4), 600);
